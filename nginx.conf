server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Enable ETag for content-based caching
    etag on;

    # HTML — never cache, always fetch fresh
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # Service worker + version — never cache
    location ~ (flutter_service_worker\.js|version\.json)$ {
        add_header Cache-Control "no-cache";
    }

    # main.dart.js — ETag handles revalidation
    location = /main.dart.js {
        add_header Cache-Control "no-cache";
    }

    # Immutable assets (fonts, images, wasm, canvaskit)
    location ~* \.(png|jpg|jpeg|gif|ico|wasm|ttf|otf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Flutter web routing fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/json
               application/javascript text/xml
               application/xml application/wasm;
}
