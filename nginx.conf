server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # HTML and service worker — never cache
    location ~ (index\.html|flutter_service_worker\.js)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        try_files $uri /index.html;
    }

    # main.dart.js — short cache, revalidate
    location = /main.dart.js {
        add_header Cache-Control "no-cache, must-revalidate";
        add_header Pragma "no-cache";
    }

    # Static assets with hash in filename — long cache
    location ~* \.(png|jpg|jpeg|gif|ico|wasm|ttf|otf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Flutter web routing fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/wasm;
}
